<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert 按钮演示页面</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .container {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    h1 {
      color: #333;
      margin-bottom: 30px;
    }
    .alert-btn {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      background-color: #007bff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
    }
    .alert-btn:hover {
      background-color: #0056b3;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0, 123, 255, 0.4);
    }
    .alert-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Alert 对话框演示</h1>
    <button class="alert-btn" id="alertBtn">点击弹出 Alert</button>
  </div>

  <script>
    document.getElementById('alertBtn').addEventListener('click', function() {
      alert('你好！这是一个 Alert 对话框。');
    });
  </script>
</body>
</html>
